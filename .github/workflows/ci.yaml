name: CI/CD Pipeline
on:
  push:
    branches: [main]
env:
  PROJECT_ID: retail-mvp-dev
  GKE_CLUSTER: gke-cluster
  GKE_REGION: us-central1-a
  REGISTRY: us-central1-docker.pkg.dev
  REPOSITORY: retail-repo
  WIF_PROVIDER: projects/1058692805920/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  WIF_SERVICE_ACCOUNT: gke-app-sa@retail-mvp-dev.iam.gserviceaccount.com

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Helm
      uses: azure/setup-helm@v4
      with:
        version: v3.14.0

    - name: Lint Helm chart
      run: |
        helm lint helm/retailos \
          -f helm/retailos/values.yaml \
          -f helm/retailos/values-dev.yaml

    - name: Authenticate to GCP via Workload Identity
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ env.WIF_PROVIDER }}
        service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

    - name: Set up gcloud
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ env.PROJECT_ID }}

    - name: Configure Docker for Artifact Registry
      run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

    # ── Frontend ────────────────────────────────────────────────────────────
    - name: Build and push frontend image
      run: |
        IMAGE=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/frontend

        # Build once, tag with commit SHA
        docker build -t ${IMAGE}:${{ github.sha }} ./frontend

        # Also tag as latest so values.yaml fallback works
        docker tag ${IMAGE}:${{ github.sha }} ${IMAGE}:latest

        # Push both tags
        docker push ${IMAGE}:${{ github.sha }}
        docker push ${IMAGE}:latest

    # ── Backend ─────────────────────────────────────────────────────────────
    - name: Build and push backend image
      run: |
        IMAGE=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend

        # Build once, tag with commit SHA
        docker build -t ${IMAGE}:${{ github.sha }} ./backend

        # Also tag as latest so values.yaml fallback works
        docker tag ${IMAGE}:${{ github.sha }} ${IMAGE}:latest

        # Push both tags
        docker push ${IMAGE}:${{ github.sha }}
        docker push ${IMAGE}:latest

    - name: Get GKE credentials
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: ${{ env.GKE_CLUSTER }}
        location: ${{ env.GKE_REGION }}

    - name: Bootstrap namespace and service account
      run: |
        kubectl create namespace retail-app --dry-run=client -o yaml | kubectl apply -f -
        kubectl create serviceaccount gke-app-ksa -n retail-app --dry-run=client -o yaml | kubectl apply -f -
        kubectl annotate serviceaccount gke-app-ksa -n retail-app \
          iam.gke.io/gcp-service-account=gke-app-sa@retail-mvp-dev.iam.gserviceaccount.com --overwrite

    # Deploy with commit SHA tag (not latest) for traceability
    - name: Deploy via Helm
      run: |
        helm upgrade --install retailos ./helm/retailos \
          --namespace retail-app \
          --create-namespace \
          -f helm/retailos/values.yaml \
          -f helm/retailos/values-dev.yaml \
          --set backend.image=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/backend:${{ github.sha }} \
          --set frontend.image=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/frontend:${{ github.sha }} \
          --timeout 10m

    # ── Post-deploy health check ─────────────────────────────────────────────
    - name: Verify rollout
      run: |
        kubectl rollout status deployment/backend -n retail-app --timeout=5m
        kubectl rollout status deployment/frontend -n retail-app --timeout=5m
        kubectl get pods -n retail-app