apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: retail-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: gke-app-ksa
      containers:
      - name: backend
        image: us-central1-docker.pkg.dev/retail-mvp-dev/retail-repo/backend:8ef76114d476a4ad6afaf03c8c1c2d896723e7ff
        ports:
        - containerPort: 8080
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: database-url
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: Jwt__Key
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: jwt-key
        - name: Jwt__Issuer
          value: "RetailOS.Api"
        - name: Jwt__Audience
          value: "RetailOS.Client"
      - name: cloud-sql-proxy
        image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.0
        args:
        - "--structured-logs"
        - "--private-ip"
        - "--port=5432"
        - "retail-mvp-dev:us-central1:postgres-instance"
        securityContext:
          runAsNonRoot: true
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
