apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: retail-app
spec:
  progressDeadlineSeconds: 900
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: gke-app-ksa
      readinessGates:
      - conditionType: "cloud.google.com/load-balancer-neg-ready"
      containers:
      - name: backend
        image: IMAGE_TAG_BACKEND
        ports:
        - containerPort: 5000
        env:
        - name: DATABASE_URL
          value: "postgresql://app_user:super-secure-password@127.0.0.1:5432/app_db?sslmode=disable&gssencmode=disable"
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: Jwt__Key
          value: "ThisIsAVerySecretKeyThatNeedsToBeLongEnoughForHMAC256"
        - name: Jwt__Issuer
          value: "RetailOS.Api"
        - name: Jwt__Audience
          value: "RetailOS.Client"
      - name: cloud-sql-proxy
        image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.0
        args:
        - "--structured-logs"
        - "--private-ip"
        - "--port=5432"
        - "retail-mvp-dev:us-central1:postgres-instance"
        securityContext:
          runAsNonRoot: true
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"



