apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: retail-app
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: retail-app
  annotations:
    cloud.google.com/backend-config: '{"default": "retail-backend-config"}'
spec:
  selector:
    app: backend
  ports:
  - port: 8000
    targetPort: 8080
  type: ClusterIP
---
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: retail-backend-config
  namespace: retail-app
spec:
  securityPolicy:
    name: retail-cloud-armor
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: retail-ingress
  namespace: retail-app
  annotations:
    ingressClassName: "gce"
    kubernetes.io/ingress.global-static-ip-name: "retail-static-ip"
    networking.gke.io/managed-certificates: ""
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 8000
