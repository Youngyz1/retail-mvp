# ─────────────────────────────────────────────
# RetailOS Helm Chart — Base Values
# Override per environment with values-dev.yaml,
# values-prod.yaml, etc.
# ─────────────────────────────────────────────

namespace: retail-app

# Kubernetes Service Account (Workload Identity)
serviceAccountName: gke-app-ksa

# ── Backend ──────────────────────────────────
backend:
  # Image is injected at deploy time by CI via --set
  image: "us-central1-docker.pkg.dev/retail-mvp-dev/retail-repo/backend:latest"
  replicas: 1
  port: 5000
  progressDeadlineSeconds: 900
  env:
    # Full PostgreSQL connection URL — override in values-dev.yaml
    databaseUrl: ""
    aspnetcoreEnvironment: "Production"

# ── Frontend ─────────────────────────────────
frontend:
  # Image is injected at deploy time by CI via --set
  image: "us-central1-docker.pkg.dev/retail-mvp-dev/retail-repo/frontend:latest"
  replicas: 1
  port: 80
  progressDeadlineSeconds: 900

# ── JWT Authentication ────────────────────────
jwt:
  # Override key in values-dev.yaml / values-prod.yaml
  key: ""
  issuer: "RetailOS.Api"
  audience: "RetailOS.Client"

# ── Cloud SQL Proxy Sidecar ───────────────────
cloudsql:
  proxyImage: "gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.11.0"
  # Cloud SQL instance connection name — override per environment
  instance: ""
  port: 5432
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"

# ── Ingress / Load Balancer ───────────────────
ingress:
  staticIpName: "retail-static-ip"
  cloudArmorPolicy: "retail-cloud-armor"
  backendConfigName: "retail-backend-config"
